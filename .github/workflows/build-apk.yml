name: Build APK

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: 'API Base URL'
        required: false
        default: 'http://76.13.233.77:5000'
      create_release:
        description: 'Crear GitHub Release'
        required: false
        default: 'true'
        type: boolean
  push:
    branches:
      - main
      - test

permissions:
  contents: write

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'beta'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL=${{ github.event.inputs.api_base_url || 'http://76.13.233.77:5000' }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: glucpred-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create GitHub Release (main only)
        if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          DATE=$(date +'%Y.%m.%d')
          TAG="v${DATE}-${SHORT_SHA}"
          BRANCH="${{ github.ref_name }}"
          COMMIT_MSG=$(git log -1 --pretty=%s)

          gh release create "$TAG" \
            build/app/outputs/flutter-apk/app-release.apk#glucpred-$TAG.apk \
            --title "GlucPred $DATE ($SHORT_SHA)" \
            --notes "**Rama:** \`$BRANCH\`
          **Commit:** \`${{ github.sha }}\`
          **Mensaje:** $COMMIT_MSG

          API apuntando a: \`${{ github.event.inputs.api_base_url || 'http://76.13.233.77:5000' }}\`" \
            --repo "${{ github.repository }}"
