name: Build APK

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: 'API Base URL'
        required: false
        default: 'http://76.13.233.77:5000'
  push:
    branches:
      - main
      - test

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'beta'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL=${{ github.event.inputs.api_base_url || 'http://76.13.233.77:5000' }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: glucpred-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
